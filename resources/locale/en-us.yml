version: 8

# Use {p} to insert the plugins prefix.
prefix: "&r&8[&dMartianEnchantments&8]&r "

effects:
  used: "&r&fUsed &r{enchant-color} {level}"

commands:
  no-permission: "&r&cYou don't have permission to do that!"
  offline-player: "&r&cThat player is not online!"
  enchantment-not-found: "&r&cEnchantment &c{enchant}&c could not be found."
  invalid-amount: "&cInvalid amount. Must be between 1-64."
  invalid-enchant: "&c{enchant} is not a valid enchant!"
  # Used by /me givebook and similar when the enchant name does not match any loaded enchant
  invalid-enchantment: "&cThat enchantment is not valid or is not loaded. Check &f/me list&c for names."
  invalid-level: "&cInvalid enchant level! Try using: {levels}"
  invalid-usage: "&cUsage: {usage}"
  reload:
    notice-scope: "&7Reload updates files under &fplugin_data/MartianEnchantments&7 (config, enchants, groups, locale, armor sets). &fRestart the server &7if something still looks out of date."
    success: "&aMartianEnchantments &freloaded &7({armor} armor YAMLs → sets: &f{sets}&7, &f{ms}ms&7)."
  not-a-number: "&c{number} is not a number!"
  not-holding-item: "&cYou must be holding an item!"
  enchantment-info:
    invalid-usage: "&cInvalid usage! Proper usage: {command} <enchantment>"
    open-menu-message: "&7Information about &e{enchant} &7enchantment."
  enchants:
    open-menu-message: "&7Showing list of all enchantments..."
  apply:
    cooldown: "&cYou will be able to use this command in {seconds} seconds."
    no-args: "&cPlease specify which player should be affected."
    reapplied: "&aYour armor has been re-applied."
    reapplied-other: "&aArmor has been reapplied for {player}."
    reapplied-for-all: "&aArmor has been reapplied for everyone!"
  withdrawsouls:
    invalid-usage: "&cUsage: /withdrawsouls <count>"
    less-than-one: "&cCount must be positive."
    invalid-item: "&cInvalid item."
  aegive:
    invalid-material: "&cInvalid material. "
    invalid-enchantment: "&cInvalid Enchantment!"
    success: "&aGave &2{amount}x {material} &ato {player}&a!"
  gedit:
    unknown-gkit: "&c{gkit} is not a valid gkit!"
    edit:
      invalid-usage: "&cUsage: /gedit edit <gkit>"
    set-permission:
      invalid-usage: "&cUsage: /gedit setpermission <gkit> <perm>"
      success: "&eChanged &6{gkit}'s&e kit permission to &6{permission}"
    reset:
      invalid-usage: "&cUsage: /gedit reset <gkit> <player>"
      success: "&6{gkit} &6gkit has been reset for player &e{player}"
    list: "&eGKits: &6{gkits}"
    setdelay:
      invalid-usage: "&cUsage: /gedit setdelay <gkit> <delay (in seconds)>"
      invalid-delay: "&c{delay} is not a valid integer!"
      success: "&eChanged &6{gkit}&e kit delay to &6{delay}"
  main:
    unknown-command: "&cUnknown usage. Run &d/me&c for MartianEnchantments commands."
    help:
      # Unused (help shows .player lines only — keeps chat one font size).
      intro: ""
      intro2: ""
      player:
        - "&r&d/me about &r&8Plugin/version blurb"
        - "&r&d/me list &r&8Custom enchant browser"
        - "&r&d/me info &f<enchant> &r&8Levels, applies, triggers"
        - "&r&d/me enchant &f<enchant> <level> &r&8Apply to held item"
        - "&r&d/me unenchant &f<enchant> &r&8Remove from held item"
        - "&r&8———————— &fAdmin &r&8————————"
        - "&r&d/me giveitem &f<player> <item> <amount> [extras] &r&8Utilities"
        - "&r&d/me givebook &f<player> <enchant> <level> <amount> <success> <destroy> &r&8Enchant books"
        - "&r&d/me givercbook &r&8Right-click loot books"
        - "&r&d/me givearmorset &f<player> <set> <piece> &r&8Configurable armor sets"
        - "&r&d/me reload &r&8Reload YAML from disk"
      console:
        - "&r&3MartianEnchantments &r&8from console"
        - "&r&f  /me reload &r&8reload data"
        - "&r&f  /me list &r&8enchant UI is in-game only"
        - "&r&f  /me info <enchant> &r&8one enchant’s details"
        - "&r&f  /me give &r&8use in-game (&d/me&f); console: reload/info/list text only"
      header: "&r&8— &dMartianEnchantments&8 · page &f{page}&8 —"
      footer: "&r&8— Aliases &d/me&f, &d/mes &8—"
      invalid-page: "&cInvalid page. Use 1 to {max}."
      pagination: "&r&fPage &f{current}&f/&f{total}&r&8. Next:&f /me {next}"
      args-hint: "&r&f< >&f = required, &f[ ]&f = optional. Don't type dash as part of commands."
      sub:
        giveitem: "Give Martian items (admin)"
        about: "Version and about"
        enchant: "Apply custom enchant to held item"
        unenchant: "Remove custom enchant from held item"
        list: "Browse enchant list (categories & forms)"
        givebook: "Give an enchanted book (admin)"
        info: "Show one enchantment’s details"
        reload: "Reload configuration"
        givercbook: "Give right-click book item (admin)"
        givearmorset: "Give armor set pieces (admin)"
    setsouls:
      invalid-usage: "&cInvalid usage: /me setsouls <amount>"
      invalid-item: "&cInvalid item."
      success: "&cSet item's soul count to: {amount}"
    unenchant:
      invalid-usage: "&cInvalid usage: /me unenchant <enchant>"
      invalid-enchant: "&c{enchant} is not a valid enchant!"
      not-holding-item: "&cYou must be holding an item!"
      does-not-have-enchant: "&cThat item doesn't have &4{enchant}&c!"
      success: "&aRemoved enchant {enchant}!"
    zip:
      zip-exists: "&cPlease try again."
      success: "&eA zip file containing all plugin data has been created at {path}."
      error: "&cAn error occurred while zipping files! Check console for more information."
    greset:
      reset: "&aReset the {gkit} kit for {player}!"
      reset-all: "&aReset all GKits for {player}!"
    claim:
      invalid-usage: "&cPlease enter enchant token."
    givegkit:
      success: "&cKit {gkit} was given to player {player}"
    giverandombook:
      success: "&aGave &2{player} {amount}x {group} &abooks!"
    givebook:
      success: "&aGave &2{player} {amount}x {enchant} {level} &abooks!"
    enchant:
      added: "&aAdded the {enchant} enchant!"
      upgraded: "&2Upgraded {enchant} from level {previous-level} to {level}."
      downgraded: "&2Downgraded {enchant} from level {previous-level} to {level}."
      removed: "&cRemoved the {enchant} enchant from the item."
    giveitem:
      success: "&7Added {amount}x {item}&r&7 for player &b{player}"
      failed: "&cCould not create that item. Check the name and arguments; see &f/me help&c and try &f/me giveitem&c in-game for syntax."
      needs-group: "&cThat item needs a &fgroup&c. Example: &f/me giveitem {player} {item} {amount} SIMPLE"
      usage-one-liner: "&c/me giveitem <player> <item> <amount> [extras] &8Use &f/me help &cextras."
      usage-lines:
        - "&r&f/me giveitem &f<player> <item> <amount> &f[extras]"
        - "&r&fGroup scrolls:&f randomizer · secret · slotincreaser · mystery · magic &8- &ftype &fafter amount&f, then &fGROUP"
        - "&r&fsoulgem:&f extras &fpool&f (count) [&flegacy group&f] &8- legacy only if rarity match is on"
        - "&r&fblackscroll:&f [&fsuccess%&f]&8 | &fmystery &8| &fmagic:&f [&fgroup&f] [&fpercent&f]"
        - "&r&forb:&f <weapon|armor|tool> <max-slots> <success%&f> &8- &ftype first extra after amount"
        - "&r&fValid items:&f {items}"
      console: "&7Console: use the same as in-game, with a player name. {items}"
    givercbook:
      success: "&aGave &2{player} {amount}x {group} &aright click books!"
    givearmorset:
      success: "&7Gave &b{player}&7 armor set &f{set}&7 piece(s): &f{piece}"
      unknown-set: "&cUnknown armor set &f{set}&c. Check &fplugin_data/.../armorSets/&c YAML."
      bad-piece: "&cInvalid piece. Use &fhelmet&c, &fchestplate&c, &fleggings&c, &fboots&c, a &fweapon key&c, &ffull&c, or &fall&c."
      usage-one-liner: "&c/me givearmorset <player> <set> <piece>"
    give:
      success: "&aSuccessfully gave {player} one {enchant} {level} book!"
    tinkereritem:
      success: "&cGave x{amount} tinkerer item's to {player}"
    admin:
      invalid-page: "&cInvalid page"
    info:
      - "&eInformation about &6{enchant} &eenchantment&7:"
      - "&6Description&7: &e{description}"
      - "&6Applies to&7: &e{applies}"
      - "&6Max level&7: &e{max-level}"

    pastetypes: "&aEnchantment type list: {url}"
    pasteenchants: "&aEnchantments list: {url}"
    open: "&aOpened {menu} for {player}!"

token:
  success: "&2&lx &aSuccessfully downloaded token &l{token}&a enchantment, reloading..."

interact:
  main-hand-only: "&cYou can only do that with your main hand!"
  # Tags: {enchant} {applies} {max-level} {roman-level} {description}
